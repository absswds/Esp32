; DFRobot FireBeetle 2 ESP32-S3 AI Camera v1.1
; MJPEG streamer → joins ESP32-TEMP WiFi AP

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; PSRAM required for camera frame buffers
build_flags =
  -DBOARD_HAS_PSRAM
  -DCONFIG_SPIRAM_MODE_OCT=y
  -DCONFIG_SPIRAM_SPEED_80M=y
  ; Camera XCLK on LEDC timer 0 — avoid conflict with WiFi
  -DCONFIG_LED_TIMER_CH0_FOR_CAMERA=y

lib_deps =
  esp32-camera
