; DFRobot FireBeetle 2 ESP32-S3 AI Camera v1.1
; MJPEG streamer → joins ESP32-TEMP WiFi AP

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; PSRAM required for camera frame buffers
board_build.arduino.memory_type = qio_opi
board_build.arduino.partitions = huge_app.csv
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  esp32-camera
